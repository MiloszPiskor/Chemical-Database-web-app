#      storageClassName: hostpath
#      resources:
#        requests:
#          storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: database-service
  labels:
    app: postgresdb
spec:
  ports:
  - port: 5432
    protocol: TCP
  selector:
    app: postgresdb