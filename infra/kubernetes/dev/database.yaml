# CONFIG FILE :( ! THUS IT HAS BEEN SWITCHED TO ConfigMap, WHICH IS A SUBSTITUTE, BUT ALSO NOT SAFE FOR PROD. 
#            - name: POSTGRESQL_USER
#              value: postgresdb
##              valueFrom:
##                secretKeyRef:
##                  name: postgres-db-secret
##                  key: POSTGRESQL_USER
#            - name: POSTGRESQL_PASSWORD
#              value: password123
##              valueFrom:
##                secretKeyRef:
##                  name: postgres-db-secret
##                  key: POSTGRESQL_PASSWORD
