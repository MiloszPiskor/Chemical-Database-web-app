apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: database-statefulset
  labels:
    app: postgresdb
spec:
  serviceName: database-service
  replicas: 1
  selector:
    matchLabels:
      app: postgresdb
  template:
    metadata:
      labels:
        app: postgresdb
    spec:
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: local-pvc
      containers:
        - name: postgresdb
          image: bitnami/postgresql:latest
          imagePullPolicy: Always
          volumeMounts:
            - mountPath: /bitnami/postgresql
              name: postgres-data
          envFrom:
            - configMapRef:
                name: postgres-secret
